<!DOCTYPE html>
<html lang="en">
<head>
  <link href="https://fonts.cdnfonts.com/css/schibsted-grotesk" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - Aviva Project Tracker</title>
</head>
<body>

  <!-- Header Banner -->
  <div class="header-banner">
    <a href="{{ url_for('index') }}" class="header-logo-link">
      <img src="https://static.aviva.io/content/dam/aviva-corporate/images/article-page-and-carousel-840-x-473/different-sized-images/aviva-primary-logo-transparent-blue-240-135px.svg" 
           alt="Aviva Logo">
    </a>
    <h1>Aviva Project Allocation Tracker</h1>
  </div>
  <br><br>

  <!-- Login Form Card -->
  <div class="card-container">
    <div class="card">
      <div class="card-text">
         <h1 style="background-color: var(--aviva-yellow);">Log In</h1>

        <!-- Flask flash messages -->
         <br><br>
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <ul class="flash-messages">
            {% for message in messages %}
              <li>{{ message }}</li>
            {% endfor %}
            </ul>
          {% endif %}
        {% endwith %}

    <!-- Log In form -->
<form method="POST">
  <div style="background: #fff; border-radius: 18px; box-shadow: 0 2px 8px #0001; padding: 24px 18px 18px 18px; min-width: 220px; max-width: 340px; width: 100%; display: flex; flex-direction: column; align-items: center; margin: 0 auto 32px auto;">
    <!-- Email input -->
    <div style="margin-bottom: 15px; width: 100%;">
      <input 
      id="email" 
      type="email" 
      name="email" 
      placeholder="Email" 
      required 
      minlength="2" maxlength="254" 
      class="form-input"
      title="Email must be at least 2 characters long, contain an '@' symbol, and not exceed 254 characters." >
    </div>
    <!-- Password input -->
    <div style="margin-bottom: 15px; width: 100%;">
      <input 
          id="password"
          type="password" 
          name="password" 
          placeholder="Password" 
          minlength="8"
          title="Password must be at least 8 characters long." 
          required class="form-input">  
    </div>
  </div>
   <!-- Container for Buttons -->
  <div style="display: flex; justify-content: center; gap: 20px; margin-top: 40px;">
    <!-- Submit Button -->
    <button type="submit" class="blue-button" style="outline: none;">Log In</button>
    <span>Don't have an account?</span>
    <!-- Sign up button -->
    <a href="{{ url_for('signup') }}" class="blue-button" style="outline: none;">Sign Up</a>
  </div>
</form>
      </div>
    </div>
  </div>
<!-- Footer -->
<footer class="footer">
  <a href="https://www.aviva.co.uk/services/about-our-business/products-and-services/privacy-policy/" target="_blank">Privacy Policy</a>
  <a href="https://static.aviva.io/content/dam/aviva-corporate/documents/socialpurpose/pdfs/aviva-modern-slavery-statement-2024.pdf" target="_blank">Modern Slavery Statement</a>
  <a href="https://www.aviva.com/legal/" target="_blank">Legal</a>
</footer>
</div>
</body>
</html>
